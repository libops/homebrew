name: formula-validation

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: formula-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Test verifier
        run: ruby test/verify_formulas_test.rb

      - name: Verify changed formulas
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if git diff --name-only --diff-filter=D "$BASE_SHA" "$HEAD_SHA" -- '*.rb' | grep -q .; then
            echo "Formula deletion requires a separate reviewed migration process" >&2
            exit 1
          fi
          mapfile -d '' formulas < <(
            git diff --name-only -z --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" -- '*.rb'
          )
          if (( ${#formulas[@]} == 0 )); then
            echo "No formulas changed"
            exit 0
          fi
          ruby scripts/verify-formulas.rb "${formulas[@]}"
